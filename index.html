<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KMB</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <link rel="apple-touch-icon" href="Screenshot_20260303-065649_InShot.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="KMB">

    <style>
        /* ستایلی شاشەی ڤیدیۆکە (Splash Screen) */
        #splash-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.6s ease;
        }

        #intro-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* ستایلی لاپەڕەی سەرەکی */
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: sans-serif; 
            background: #2c3e50; 
            color: white; 
            overflow: hidden; 
        }

        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 30px; 
            text-align: center; 
            color: #333; 
            width: 320px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }

        #number { font-size: 80px; font-weight: bold; margin: 10px 0; color: #2c3e50; }
        
        .grid-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        
        button { 
            font-size: 20px; 
            padding: 20px; 
            cursor: pointer; 
            border-radius: 15px; 
            border: none; 
            color: white; 
            transition: 0.2s; 
            font-weight: bold; 
        }
        
        button:active { transform: scale(0.9); }
        
        .plus-1 { background: #00b894; }
        .plus-5 { background: #00cec9; }
        .minus-1 { background: #d63031; }
        .minus-5 { background: #e17055; }

        h2 { margin: 0; font-size: 22px; color: #636e72; }
    </style>
</head>
<body>

<div id="splash-overlay">
    <video id="intro-video" autoplay muted playsinline>
        <source src="InShot_20260303_073640134.mp4" type="video/mp4">
    </video>
</div>

<div class="card">
    <h2>KMB Control</h2>
    <div id="number">...</div>
    
    <div class="grid-controls">
        <button class="plus-5" onclick="update(5)">+5</button>
        <button class="plus-1" onclick="update(1)">+1</button>
        <button class="minus-5" onclick="update(-5)">-5</button>
        <button class="minus-1" onclick="update(-1)">-1</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBOkQ3BOGpFnVuYo1664QvsOh1FO36VvW4",
        authDomain: "mybfj-6b83d.firebaseapp.com",
        databaseURL: "https://mybfj-6b83d-default-rtdb.firebaseio.com",
        projectId: "mybfj-6b83d",
        storageBucket: "mybfj-6b83d.firebasestorage.app",
        messagingSenderId: "534313885128",
        appId: "1:534313885128:web:2ecb89d1443256839a34fd"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let count = 0;

    // لادانی ڤیدیۆکە کاتێک تەواو دەبێت
    const video = document.getElementById('intro-video');
    video.onended = () => hideSplash();
    setTimeout(hideSplash, 3000); // ئەگەر ڤیدیۆکە کاری نەکرد دوای ٣ چرکە لایدەبات

    function hideSplash() {
        const splash = document.getElementById('splash-overlay');
        splash.style.opacity = '0';
        setTimeout(() => splash.style.display = 'none', 600);
    }

    // وەرگرتنی داتا لە فایەربەیس
    db.ref('global_count').on('value', (snapshot) => {
        count = snapshot.val() || 0;
        document.getElementById('number').innerText = count;
    });

    function update(val) {
        db.ref('/').update({ global_count: count + val });
    }
    
    // سێرڤس وۆرکەر بۆ ئینستاڵ کردن
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>

</body>
</html>
