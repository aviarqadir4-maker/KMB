<!DOCTYPE html>
<html dir="rtl" lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کۆنتڕۆڵی پارێزراو</title>
    
    <link rel="manifest" href="/KMB/manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/573/573150.png">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; background: #2c3e50; color: white; }
        .card { background: white; padding: 40px; border-radius: 30px; text-align: center; color: #333; width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #number { font-size: 100px; font-weight: bold; margin: 20px 0; }
        .controls button { font-size: 30px; width: 60px; height: 60px; cursor: pointer; border-radius: 15px; border: none; color: white; opacity: 0.3; pointer-events: none; transition: 0.3s; }
        .plus { background: #00b894; } .minus { background: #d63031; }
        .unlocked .controls button { opacity: 1; pointer-events: auto; }
        #lock-btn { margin-top: 20px; padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="card" id="main-card">
    <h2 id="status">دۆخی سەیرکردن 👁️</h2>
    <div id="number">...</div>
    <div class="controls">
        <button class="plus" onclick="update(1)">+</button>
        <button class="minus" onclick="update(-1)">-</button>
    </div>
    <button id="lock-btn" onclick="checkCode()">کردنەوەی قفڵ 🔒</button>
</div>

<script>
    // بەستنەوەی فایلی Service Worker بۆ ئەوەی ببێتە ئەپ
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/KMB/sw.js')
        .then(() => console.log("Service Worker Registered"));
    }

    const firebaseConfig = {
        apiKey: "AIzaSyBOkQ3BOGpFnVuYo1664QvsOh1FO36VvW4",
        authDomain: "mybfj-6b83d.firebaseapp.com",
        databaseURL: "https://mybfj-6b83d-default-rtdb.firebaseio.com",
        projectId: "mybfj-6b83d",
        storageBucket: "mybfj-6b83d.firebasestorage.app",
        messagingSenderId: "534313885128",
        appId: "1:534313885128:web:2ecb89d1443256839a34fd"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let count = 0;

    db.ref('global_count').on('value', (snapshot) => {
        count = snapshot.val() || 0;
        document.getElementById('number').innerText = count;
    });

    function update(val) {
        db.ref('/').update({ global_count: count + val });
    }

    function checkCode() {
        if (prompt("کۆد بنووسە:") === "6778") {
            document.getElementById('main-card').classList.add('unlocked');
            document.getElementById('status').innerText = "دۆخی دەستکاریکردن ✅";
            document.getElementById('lock-btn').style.display = "none";
        }
    }
</script>
</body>
</html>
